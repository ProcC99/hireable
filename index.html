<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #eef0f7;
      --surface: #f9faff;
      --border: rgba(0,0,0,0.09);
      --text: #1e1e30;
      --muted: #7a7a9a;
      --accent: #6c5ce7;
      --accent-light: rgba(108,92,231,0.1);
      --accent-glow: rgba(108,92,231,0.13);
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    body::before {
      content: '';
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(108,92,231,0.06), 0 1px 4px rgba(0,0,0,0.04);
    }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid rgba(108,92,231,0.2);
      border-radius: 100px;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.75rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    h1 span { color: var(--accent); }

    p {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .notify-form {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .notify-form input[type="email"] {
      flex: 1;
      min-width: 200px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .notify-form input[type="email"]::placeholder { color: var(--muted); }
    .notify-form input[type="email"]:focus { border-color: var(--accent); }

    .notify-form button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.4rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .notify-form button:hover { opacity: 0.88; transform: translateY(-1px); }
    .notify-form button:active { transform: translateY(0); }

    /*
      Camouflage trap container.
      - Not display:none, not visibility:hidden, not off-screen
      - A real rendered block, fully in flow
      - Foreground color = background color = matches card surface
      - Looks like a blank spacer to a human eye
      - A real input sits inside it — bots that fill all inputs get caught
    */
    .spacer-block {
      background-color: var(--surface);
      color: var(--surface);
      border: none;
      padding: 0.4rem 0;
      margin: 0.5rem 0;
      width: 100%;
      font-size: 0.95rem;
      pointer-events: none;
      user-select: none;
      overflow: hidden;
      height: 1.8rem;
    }

    .spacer-block input {
      background: transparent;
      border: none;
      color: transparent;
      caret-color: transparent;
      width: 100%;
      font-size: inherit;
      padding: 0;
      outline: none;
      pointer-events: none;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0 1.5rem;
    }

    .links {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 0.875rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .links a:hover { color: var(--accent); }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      .notify-form { flex-direction: column; }
      .notify-form input[type="email"],
      .notify-form button { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="badge">Coming Soon</div>

    <h1>Something's<br /><span>being built.</span></h1>

    <p>This space is under construction. Drop your email and you'll be the first to know when it's live.</p>

    <form class="notify-form" id="notifyForm" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="482d3bcc-c577-4163-b038-242d10e40346">

      <input type="email" name="email" placeholder="backup651@boxfi.uk" required autocomplete="email" />

      <!--
        Camouflage honeypot: rendered block, same fg/bg as card surface.
        No display:none. No visibility:hidden. No z-index tricks.
        Looks like blank whitespace. Bots that auto-fill all fields get flagged.
        JS timing layer adds a second filter.
      -->
      <div class="spacer-block" role="presentation" aria-hidden="false">
        <input
          type="text"
          name="website"
          id="website"
          tabindex="-1"
          autocomplete="off"
          value=""
        />
      </div>

      <input type="hidden" name="_next" value="https://hireable.eu.cc" />

      <button type="submit">Notify me</button>
    </form>

    <hr class="divider" />

    <div class="links">
      <a href="mailto:backup651@boxfi.uk">Email</a>
      <a href="#">Projects</a>
    </div>
  </div>

  <footer>&copy; 2026 &mdash; All rights reserved.</footer>

  <script>
    const formLoadTime = Date.now();
    const form = document.getElementById('notifyForm');

    form.addEventListener('submit', function(e) {
      const trap = document.getElementById('website');
      const elapsed = Date.now() - formLoadTime;

      // Reject if: honeypot filled OR submitted in under 3s OR suspiciously fast (bot)
      if (trap.value !== '' || elapsed < 3000) {
        e.preventDefault();
        // Fake success — bot thinks it worked, no retry signal
        const btn = form.querySelector('button');
        btn.textContent = 'Done ✓';
        btn.style.background = '#00b894';
        btn.disabled = true;
        return;
      }

      // Real submission — show optimistic UI while Formspree processes
      e.preventDefault();
      const btn = form.querySelector('button');
      btn.textContent = 'Sending...';
      btn.disabled = true;

      const data = new FormData(form);

      fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      })
      .then(res => {
        if (res.ok) {
          btn.textContent = 'Done ✓';
          btn.style.background = '#00b894';
        } else {
          btn.textContent = 'Try again';
          btn.style.background = '#d63031';
          btn.disabled = false;
        }
      })
      .catch(() => {
        btn.textContent = 'Try again';
        btn.style.background = '#d63031';
        btn.disabled = false;
      });
    });
  </script>

</body>
</html>
